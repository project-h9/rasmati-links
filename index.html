<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Link Shortener</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin-top: 100px;
    }
    input {
      padding: 10px;
      width: 300px;
      border-radius: 10px;
      border: none;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #38bdf8;
    }
  </style>
</head>
<body>

  <h1>🔥 Link Shortener</h1>

  <input id="url" placeholder="Enter your link">
  <br><br>
  <button onclick="shorten()">Shorten</button>

  <div id="result"></div>

  <script>
    async function shorten() {
      let url = document.getElementById("url").value;

      let res = await fetch("/api/index", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ url })
      });

      let data = await res.json();

      document.getElementById("result").innerHTML =
        "<p>" + data.short + "</p>";
    }
  </script>

</body>
</html>
